name: CI

# What this pipeline does — and does NOT do:
#
# This repo is a Claude-executed QA automation framework for NAKIVO B&R File-Level/File-Share
# Backup. The actual TEST EXECUTION is an LLM agent driving RPC calls against live, PRIVATE lab
# appliances (10.10.16.84 / 10.10.15.5) — there is no scriptable pytest suite for that, and those
# appliances are not reachable from GitHub-hosted runners. So this pipeline does the part that
# genuinely CAN run on hosted infrastructure, honestly:
#   - lints and unit-tests the framework's own Python code (reporting/, browser/)
#   - regression-tests every committed runbook (cases/**/*.md) and job template
#     (test-data/job-templates/*.json) for structural correctness
#   - regenerates the Allure report from the repo's recorded execution history and publishes it
#     as a downloadable artifact
# The Playwright UI-smoke job is included (installs Playwright + browsers, with caching) but is
# gated to manual dispatch on a self-hosted runner with lab-network access — it is a no-op on
# ordinary pushes/PRs, by design, rather than a job that would always fail on hosted runners.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_lab_smoke:
        description: "Also run the Playwright lab-network smoke job (needs a self-hosted runner with access to the internal NBR appliances)"
        type: boolean
        default: false

# Least-privilege default; individual jobs opt into more only if they need it.
permissions:
  contents: read

# Cancel superseded runs on the same branch/PR instead of burning minutes on stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Single source of truth for tool versions — bump here, not scattered across steps.
  PYTHON_VERSION: "3.12"
  ALLURE_VERSION: "2.32.0"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff
        run: ruff check reporting browser tests

  test:
    name: Unit tests + Allure report
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        # --junitxml and --alluredir are set once, in pyproject.toml's addopts (single source of
        # truth) — not repeated here, so this pytest run's own results also land in
        # results/allure-results and get folded into the Allure report generated below.
        run: pytest

      - name: Set up Java (Allure CLI runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Allure CLI
        id: allure-cache
        uses: actions/cache@v4
        with:
          path: ~/.npm-global/allure-${{ env.ALLURE_VERSION }}
          key: allure-cli-${{ env.ALLURE_VERSION }}

      - name: Install Allure CLI
        if: steps.allure-cache.outputs.cache-hit != 'true'
        run: |
          npm install --global --prefix ~/.npm-global/allure-${{ env.ALLURE_VERSION }} allure-commandline@${{ env.ALLURE_VERSION }}

      - name: Generate Allure report from recorded run history
        run: |
          export PATH="$HOME/.npm-global/allure-${{ env.ALLURE_VERSION }}/bin:$PATH"
          python -m reporting.generate --all

      - name: Upload Allure results + report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: |
            results/allure-results
            results/allure-report
          retention-days: 30
          if-no-files-found: warn

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: results/junit.xml
          retention-days: 30
          if-no-files-found: warn

  playwright-lab-smoke:
    name: Playwright lab smoke (self-hosted, manual opt-in only)
    # Only ever queues when explicitly dispatched with run_lab_smoke=true — never on ordinary
    # push/PR — because hosted GitHub runners cannot reach the private 10.10.x.x lab network.
    if: github.event_name == 'workflow_dispatch' && inputs.run_lab_smoke == true
    runs-on: [self-hosted, nbr-lab]
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Playwright's own recommended caching recipe: cache the downloaded browser binaries,
      # keyed by OS + the pinned Playwright version (via the lockfile hash) so a version bump
      # naturally invalidates the cache instead of silently reusing stale browsers.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Write UI credentials from secrets (never committed; gitignored path)
        run: |
          cat > browser/config/ui_config.json <<EOF
          {"url": "${{ secrets.NBR_FLB_UI_URL }}", "user": "${{ secrets.NBR_FLB_UI_USER }}", "password": "${{ secrets.NBR_FLB_UI_PASSWORD }}"}
          EOF

      - name: Run FLB wizard smoke check
        working-directory: browser
        run: python checks/check_flb_wizard_smoke.py

      - name: Upload smoke-check screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-lab-smoke-screenshots
          path: results/screenshots
          retention-days: 14
          if-no-files-found: warn
